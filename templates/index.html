<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI in QA Automation - POC Demo</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #8b949e; margin-top: 0; margin-bottom: 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tabbtn { padding: 8px 14px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; cursor: pointer; font-size: 14px; }
  .tabbtn.active { background: #21262d; border-color: #58a6ff; }
  .panel { display: none; }
  .panel.active { display: block; }
  textarea { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 13px; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
  button.run { margin-top: 10px; padding: 8px 16px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; font-size: 14px; }
  button.run:hover { background: #2ea043; }
  .result { margin-top: 16px; background: #161b22; border-radius: 6px; padding: 14px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; border: 1px solid #30363d; }
  .loading { color: #8b949e; font-size: 13px; }
</style>
</head>
<body>
  <h1>AI in QA Automation — POC Demo</h1>
  <p class="sub">DXC client QA process | live prototype</p>

  <div class="tabs">
    <button class="tabbtn active" data-tab="heal">1. Self-healing test</button>
    <button class="tabbtn" data-tab="ticket">2. Auto ticket draft</button>
    <button class="tabbtn" data-tab="api">3. API test generator</button>
  </div>

  <div id="panel-heal" class="panel active">
    <p>Paste a failing test error/log. AI will diagnose it and propose a fix.</p>
    <textarea id="heal-input" rows="5">AssertionError: Element not found: //button[@id='submit-btn-old']
Test: test_checkout_submit
Last passed: 3 days ago
Recent commit: "renamed submit button id to submit-btn-v2 for A/B test"</textarea>
    <br><button class="run" onclick="run('heal')">Analyze and propose fix</button>
    <div id="heal-out"></div>
  </div>

  <div id="panel-ticket" class="panel">
    <p>Paste a test failure result. AI drafts a ready-to-file bug ticket.</p>
    <textarea id="ticket-input" rows="5">Test: test_login_with_valid_credentials
Status: FAILED
Expected: redirect to /dashboard
Actual: stayed on /login, error toast "Invalid session token"
Environment: staging, Chrome 126
Timestamp: 2026-07-15 09:12 UTC</textarea>
    <br><button class="run" onclick="run('ticket')">Draft ticket</button>
    <div id="ticket-out"></div>
  </div>

  <div id="panel-api" class="panel">
    <p>Paste a captured API request/response (like from Fiddler). AI generates a test class.</p>
    <textarea id="api-input" rows="6">POST /api/v2/orders
Request body: {"userId": 4821, "items": [{"sku":"A100","qty":2}], "coupon": null}
Response 201: {"orderId":"ORD-99213","status":"created","total":59.98}</textarea>
    <br><button class="run" onclick="run('api')">Generate test class</button>
    <div id="api-out"></div>
  </div>

<script>
document.querySelectorAll('.tabbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabbtn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

const endpoints = { heal: '/api/heal', ticket: '/api/ticket', api: '/api/apitest' };

async function run(kind) {
  const input = document.getElementById(kind + '-input').value;
  const out = document.getElementById(kind + '-out');
  out.innerHTML = '<p class="loading">Thinking...</p>';
  try {
    const res = await fetch(endpoints[kind], {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input })
    });
    const data = await res.json();
    out.innerHTML = '<div class="result"></div>';
    out.querySelector('.result').textContent = data.result;
  } catch (e) {
    out.innerHTML = '<p style="color:#f85149">Error: ' + e.message + '</p>';
  }
}
</script>
</body>
</html>
