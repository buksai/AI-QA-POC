<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Capture System - Desktop Client (v4.2)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", Tahoma, sans-serif; font-size: 12px;
    background: #ece9d8; margin: 0; padding: 0; color: #000;
  }
  .titlebar {
    background: linear-gradient(180deg, #4a90d9 0%, #2f5f9e 100%);
    color: white; padding: 4px 8px; font-weight: bold; font-size: 12.5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .titlebar .btns span { display: inline-block; width: 18px; height: 16px; background: #d4d0c8; border: 1px solid #888; margin-left: 2px; text-align: center; color: #000; font-size: 10px; line-height: 15px; }
  .toolbar { background: #d4d0c8; border-bottom: 1px solid #888; padding: 4px 6px; font-size: 11px; color: #444; }
  .content { padding: 12px; }
  fieldset {
    border: 1px solid #919b9c; background: #f0f0e8; margin-bottom: 10px; padding: 10px 12px;
    border-radius: 0;
  }
  legend { font-weight: bold; padding: 0 4px; color: #003c74; }
  .row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
  .row label { width: 130px; text-align: right; flex-shrink: 0; }
  input[type=text], input[type=number], select {
    border: 1px solid #7f9db9; padding: 2px 4px; font-family: "Segoe UI", Tahoma, sans-serif; font-size: 12px;
    background: #fff; flex: 1;
  }
  button {
    background: linear-gradient(180deg, #fefefe 0%, #ece9d8 100%);
    border: 1px solid #888; padding: 4px 14px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: #2f5f9e; }
  button:active { background: #d4d0c8; }
  .btn-row { display: flex; gap: 6px; margin-top: 8px; }
  #tradeStatus {
    border: 1px inset #888; background: #fff; padding: 3px 8px; font-weight: bold;
    display: inline-block; min-width: 90px;
  }
  table { border-collapse: collapse; width: 100%; background: #fff; font-size: 11.5px; margin-top: 6px; }
  th { background: #d4d0c8; border: 1px solid #919b9c; padding: 3px 6px; text-align: left; }
  td { border: 1px solid #ccc; padding: 3px 6px; }
  .statusbar { background: #d4d0c8; border-top: 1px solid #888; padding: 3px 8px; font-size: 11px; color: #444; }
  #log { font-family: Consolas, monospace; font-size: 10.5px; background: #fff; border: 1px inset #888; padding: 6px; height: 90px; overflow-y: auto; color: #333; }
</style>
</head>
<body>
  <div class="titlebar">
    <span>Trade Capture System - Desktop Client (v4.2) [WPF]</span>
    <span class="btns"><span>_</span><span>&#9633;</span><span>X</span></span>
  </div>
  <div class="toolbar">File &nbsp; Edit &nbsp; Trade &nbsp; Reports &nbsp; Window &nbsp; Help</div>

  <div class="content">
    <fieldset>
      <legend>Trade Details</legend>
      <div class="row"><label for="txtTradeId">Trade ID:</label><input type="text" id="txtTradeId" placeholder="(assigned on create)" readonly></div>
      <div class="row"><label>Commodity:</label><select id="cmbCommodity"><option>Copper Concentrate</option></select></div>
      <div class="row"><label>Counterparty:</label><input type="text" id="txtCounterparty" value="Southern Metals Corp"></div>
      <div class="btn-row">
        <button id="btnCreateTrade">Create Trade</button>
        <label style="width:auto; margin-left: 20px;">Status:</label>
        <span id="tradeStatus">DRAFT</span>
      </div>
    </fieldset>

    <fieldset>
      <legend>Shipment Tranche</legend>
      <div class="row"><label>Shipment Month:</label><input type="text" id="txtMonth" value="2026-09"></div>
      <div class="row"><label>Quantity (tonnes):</label><input type="number" id="txtQty" value="2000"></div>
      <div class="row"><label>Origin Port:</label><input type="text" id="txtOrigin" value="Buenaventura"></div>
      <div class="row"><label>Destination Port:</label><input type="text" id="txtDest" value="Qingdao"></div>
      <div class="btn-row"><button id="btnAddTranche">Add Tranche</button></div>
      <table id="trancheTable">
        <thead><tr><th>#</th><th>Month</th><th>Qty (t)</th><th>Origin</th><th>Dest</th></tr></thead>
        <tbody></tbody>
      </table>
    </fieldset>

    <fieldset>
      <legend>Lifecycle Actions</legend>
      <div class="btn-row">
        <button id="btnConfirmTrade">Confirm Trade</button>
        <button id="btnGetValuation">Get Jupiter Valuation</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <label>Valuation (USD):</label>
        <span id="lblValuation" style="font-weight:bold;">-</span>
      </div>
    </fieldset>

    <fieldset>
      <legend>Amend Trade</legend>
      <div class="row"><label>Tranche Index:</label><input type="number" id="txtAmendIdx" value="0" style="max-width:60px;"></div>
      <div class="row"><label>New Quantity (t):</label><input type="number" id="txtAmendQty" value="2500"></div>
      <div class="btn-row"><button id="btnAmend">Amend Tranche</button></div>
    </fieldset>

    <fieldset>
      <legend>Event Log</legend>
      <div id="log"></div>
    </fieldset>
  </div>

  <div class="statusbar">Connected to Trade Capture Backend: 127.0.0.1:5100</div>

<script>
const API = "http://127.0.0.1:5100/api";
let currentTradeId = null;

function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML += new Date().toLocaleTimeString() + "  " + msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method, headers: {"Content-Type": "application/json"},
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "request failed");
  return data;
}

function renderTrade(trade) {
  document.getElementById("txtTradeId").value = trade.tradeId;
  document.getElementById("tradeStatus").textContent = trade.status;
  const tbody = document.querySelector("#trancheTable tbody");
  tbody.innerHTML = "";
  trade.tranches.forEach(t => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${t.index}</td><td>${t.shipmentMonth}</td><td>${t.quantityTonnes}</td><td>${t.originPort}</td><td>${t.destinationPort}</td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById("btnCreateTrade").onclick = async () => {
  try {
    const trade = await api("POST", "/trades", {
      commodity: document.getElementById("cmbCommodity").value,
      counterparty: document.getElementById("txtCounterparty").value
    });
    currentTradeId = trade.tradeId;
    renderTrade(trade);
    log("Trade created: " + trade.tradeId);
  } catch (e) { log("ERROR: " + e.message); }
};

document.getElementById("btnAddTranche").onclick = async () => {
  if (!currentTradeId) { log("ERROR: create a trade first"); return; }
  try {
    const trade = await api("POST", `/trades/${currentTradeId}/tranches`, {
      shipmentMonth: document.getElementById("txtMonth").value,
      quantityTonnes: parseFloat(document.getElementById("txtQty").value),
      originPort: document.getElementById("txtOrigin").value,
      destinationPort: document.getElementById("txtDest").value
    });
    renderTrade(trade);
    log("Tranche added to " + currentTradeId);
  } catch (e) { log("ERROR: " + e.message); }
};

document.getElementById("btnConfirmTrade").onclick = async () => {
  if (!currentTradeId) { log("ERROR: create a trade first"); return; }
  try {
    const trade = await api("POST", `/trades/${currentTradeId}/confirm`);
    renderTrade(trade);
    log("Trade confirmed: " + currentTradeId);
  } catch (e) { log("ERROR: " + e.message); }
};

document.getElementById("btnGetValuation").onclick = async () => {
  if (!currentTradeId) { log("ERROR: create a trade first"); return; }
  try {
    const v = await api("GET", `/trades/${currentTradeId}/valuation`);
    document.getElementById("lblValuation").textContent = v.totalValueUsd.toLocaleString();
    log("Valuation fetched from Jupiter: $" + v.totalValueUsd.toLocaleString());
  } catch (e) { log("ERROR: " + e.message); }
};

document.getElementById("btnAmend").onclick = async () => {
  if (!currentTradeId) { log("ERROR: create a trade first"); return; }
  try {
    const idx = document.getElementById("txtAmendIdx").value;
    const qty = parseFloat(document.getElementById("txtAmendQty").value);
    const trade = await api("POST", `/trades/${currentTradeId}/tranches/${idx}/amend`, { quantityTonnes: qty });
    renderTrade(trade);
    log("Tranche " + idx + " amended to " + qty + " tonnes");
  } catch (e) { log("ERROR: " + e.message); }
};
</script>
</body>
</html>
