<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autonomous QA Agent — Live Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --canvas: #010409; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --link: #58a6ff; --green: #3fb950;
    --amber: #d29922; --purple: #a371f7; --red: #f85149;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--font); font-size: 14px; max-width: 1000px; margin: 0 auto;
    padding: 24px 16px 64px; background: var(--canvas); color: var(--text); line-height: 1.5; }
  .header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--muted); font-size: 12.5px; margin: 0; }
  .controls { display: flex; gap: 8px; margin: 16px 0 20px; flex-wrap: wrap; }
  button {
    font-family: var(--font); font-size: 13px; font-weight: 500; padding: 7px 14px;
    border-radius: 6px; border: 1px solid rgba(240,246,252,0.1); cursor: pointer; color: white;
  }
  #btn-reset { background: var(--purple); }
  #btn-dev-change { background: #9a6700; }
  #btn-run { background: #238636; }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .stream { border: 1px solid var(--border); border-radius: 8px; background: var(--panel); padding: 16px; min-height: 300px; }
  .event { margin-bottom: 12px; padding-left: 14px; border-left: 2px solid var(--border); }
  .event.reasoning { border-left-color: var(--link); }
  .event.tool_call { border-left-color: var(--amber); }
  .event.tool_result { border-left-color: var(--green); }
  .event.final { border-left-color: var(--purple); background: rgba(163,113,247,0.08); padding: 10px 14px; border-radius: 6px; }
  .event.error { border-left-color: var(--red); }
  .event-label { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 4px; }
  .event-body { font-size: 13px; white-space: pre-wrap; }
  .event-body.mono { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .thinking { display: inline-flex; align-items: center; gap: 6px; color: var(--amber); font-size: 12.5px; font-family: var(--mono); }
  .spinner { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--amber); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="header">
    <h1>Autonomous QA Agent</h1>
    <p class="sub">buksai/AI-QA-POC/trafigura-scenario-v2 — the agent decides its own investigation, not a fixed script · Huseynbala Gurbanli</p>
  </div>

  <div class="controls">
    <button id="btn-reset">↺ Reset workspace</button>
    <button id="btn-dev-change">Apply dev change (break something)</button>
    <button id="btn-run">▶ Run autonomous agent</button>
  </div>

  <div class="stream" id="stream">
    <p style="color:var(--muted); font-size:13px;">Click "Run autonomous agent" to start. The agent decides for itself what to check and what to fix — watch its reasoning stream in below.</p>
  </div>

<script>
const streamEl = document.getElementById("stream");

function addEvent(kind, label, body, mono) {
  const div = document.createElement("div");
  div.className = "event " + kind;
  div.innerHTML = `<div class="event-label">${label}</div><div class="event-body${mono ? ' mono' : ''}"></div>`;
  div.querySelector(".event-body").textContent = body;
  streamEl.appendChild(div);
  streamEl.scrollTop = streamEl.scrollHeight;
  return div;
}

document.getElementById("btn-reset").onclick = async (e) => {
  e.target.disabled = true;
  const res = await fetch("/api/reset", { method: "POST" });
  const data = await res.json();
  addEvent("tool_result", "workspace reset", data.output || "(reset)", true);
  e.target.disabled = false;
};

document.getElementById("btn-dev-change").onclick = async (e) => {
  e.target.disabled = true;
  const res = await fetch("/api/apply-dev-change", { method: "POST" });
  const data = await res.json();
  addEvent("tool_result", "dev change applied", data.output, true);
  e.target.disabled = false;
};

document.getElementById("btn-run").onclick = () => {
  const btn = document.getElementById("btn-run");
  btn.disabled = true;
  streamEl.innerHTML = "";
  const thinking = document.createElement("div");
  thinking.className = "thinking";
  thinking.innerHTML = '<span class="spinner"></span> agent is running...';
  streamEl.appendChild(thinking);

  const source = new EventSource("/api/run-agent");

  source.onmessage = (event) => {
    const { kind, data } = JSON.parse(event.data);
    if (kind === "start") {
      addEvent("reasoning", "task given to agent", data.task);
    } else if (kind === "reasoning") {
      addEvent("reasoning", "agent reasoning", data.text);
    } else if (kind === "tool_call") {
      addEvent("tool_call", "tool call → " + data.name, JSON.stringify(data.input, null, 2), true);
    } else if (kind === "tool_result") {
      const resultStr = JSON.stringify(data.result, null, 2);
      addEvent("tool_result", "result ← " + data.name, resultStr.slice(0, 1500), true);
    } else if (kind === "final") {
      addEvent("final", "AGENT SUMMARY", data.summary);
    } else if (kind === "error") {
      addEvent("error", "error", data.message);
    }
  };

  source.addEventListener("done", () => {
    thinking.remove();
    source.close();
    btn.disabled = false;
  });

  source.onerror = () => {
    thinking.remove();
    source.close();
    btn.disabled = false;
  };
};
</script>
</body>
</html>
