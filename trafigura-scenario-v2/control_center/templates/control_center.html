<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trafigura QA Automation — POC</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Arial, sans-serif; margin: 0; background: #fff; color: #111; }

  .topbar { border-bottom: 1px solid #ddd; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
  .topbar h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .badge { font-size: 12px; color: #666; font-family: monospace; }
  .badge .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #999; margin-right: 5px; }
  .badge .dot.up { background: #2e7d32; }
  .badge .dot.down { background: #c62828; }
  .badge .dot.fee { background: #ef6c00; }

  .tabs { display: flex; border-bottom: 1px solid #ddd; padding: 0 20px; }
  .tab { padding: 10px 16px; font-size: 13.5px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #111; border-bottom-color: #111; font-weight: 600; }

  .view { display: none; height: calc(100vh - 96px); }
  .view.active { display: block; }
  iframe { width: 100%; height: 100%; border: none; }

  .agent-view { display: none; padding: 18px 20px; }
  .agent-view.active { display: block; }

  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  button {
    font-family: -apple-system, Arial, sans-serif; font-size: 13px; padding: 7px 13px;
    border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; cursor: pointer; color: #111;
  }
  button:hover { background: #eee; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: #111; color: #fff; border-color: #111; }
  button.primary:hover { background: #333; }

  .log {
    background: #0d0d0d; color: #d0d0d0; font-family: "SF Mono", Consolas, monospace;
    font-size: 12.5px; line-height: 1.55; padding: 14px 16px; border-radius: 6px;
    height: calc(100vh - 200px); overflow-y: auto; white-space: pre-wrap;
  }
  .log .line-pass { color: #6bcf6b; }
  .log .line-fail { color: #ff8080; }
  .log .line-tool { color: #7fb8ff; }
  .log .line-final { color: #ffd166; font-weight: 600; }

  .fix-panel { border: 1px solid #f0ad4e; background: #fffaf0; border-radius: 6px; margin-bottom: 14px; overflow: hidden; }
  .fix-panel-title { background: #f0ad4e; color: #fff; font-size: 12px; font-weight: 600; padding: 6px 12px; }
  .fix-panel-body { font-family: "SF Mono", Consolas, monospace; font-size: 12.5px; line-height: 1.6; padding: 12px 14px; white-space: pre-wrap; max-height: 260px; overflow-y: auto; }
  .fix-panel-body .diff-add { color: #1a7f37; background: #e6ffec; display: block; }
  .fix-panel-body .diff-del { color: #b31d28; background: #ffebe9; display: block; }
  .fix-panel-body .diff-hunk { color: #8250df; }
  .fix-panel-body .diff-file { color: #57606a; font-weight: 600; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>Trafigura QA Automation — POC</h1>
    <div class="badge"><span class="dot" id="backend-dot"></span><span id="backend-text">checking backend...</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="agent">POC AI Engineer</div>
    <div class="tab" data-view="legacy">Trafigura Enterprise Legacy Demo</div>
    <div class="tab" data-view="web">New System</div>
  </div>

  <div class="view active agent-view" id="view-agent">
    <div class="row">
      <button class="primary" id="btn-run">Run agent</button>
      <button id="btn-dev-change">Break the suite (inject change)</button>
      <button id="btn-reset">Reset</button>
    </div>
    <div class="fix-panel" id="fix-panel" style="display:none;">
      <div class="fix-panel-title">Proposed code fix</div>
      <div class="fix-panel-body" id="fix-panel-body"></div>
    </div>
    <div class="log" id="log">Click "Run agent" to start.</div>
  </div>

  <div class="view" id="view-legacy"><iframe src="/legacy"></iframe></div>
  <div class="view" id="view-web"><iframe src="/web"></iframe></div>

<script>
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("view-" + tab.dataset.view).classList.add("active");
  });
});

async function refreshBackendStatus() {
  const dot = document.getElementById("backend-dot");
  const text = document.getElementById("backend-text");
  try {
    const res = await fetch("/api/backend-status");
    const data = await res.json();
    if (data.error) { dot.className = "dot down"; text.textContent = "backend down"; }
    else if (data.handlingFeeEnabled) { dot.className = "dot fee"; text.textContent = "backend up · fee ON"; }
    else { dot.className = "dot up"; text.textContent = "backend up · fee OFF"; }
  } catch (e) { dot.className = "dot down"; text.textContent = "backend down"; }
}
refreshBackendStatus();
setInterval(refreshBackendStatus, 3000);

const logEl = document.getElementById("log");
function logLine(text, cls) {
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}
function logBlock(text) {
  text.split("\n").forEach(line => {
    let cls = "";
    if (/^PASSED/.test(line)) cls = "line-pass";
    else if (/FAILED|Error/.test(line)) cls = "line-fail";
    else if (/^\+/.test(line)) cls = "line-pass";
    else if (/^-/.test(line)) cls = "line-fail";
    else if (/^(---|\+\+\+|@@)/.test(line)) cls = "line-tool";
    else if (/^===|^total_scenarios=|^workers=|^duration_ms=/.test(line)) cls = "line-final";
    logLine(line, cls);
  });
}

const fixPanel = document.getElementById("fix-panel");
const fixPanelBody = document.getElementById("fix-panel-body");
function showFixPanel(result) {
  fixPanel.style.display = "block";
  const header = `${result.total_fixed} file(s) fixed: ${(result.files_fixed || []).join(", ")}\npattern: ${result.pattern_applied || ""}\n\n`;
  const html = (header + result.diff).split("\n").map(line => {
    const esc = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    if (/^\+/.test(line)) return `<span class="diff-add">${esc}</span>`;
    if (/^-/.test(line)) return `<span class="diff-del">${esc}</span>`;
    if (/^(---|\+\+\+)/.test(line)) return `<span class="diff-file">${esc}</span>`;
    if (/^@@/.test(line)) return `<span class="diff-hunk">${esc}</span>`;
    return esc;
  }).join("\n");
  fixPanelBody.innerHTML = html;
  fixPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

document.getElementById("btn-reset").onclick = async (e) => {
  e.target.disabled = true;
  const res = await fetch("/api/reset-agent-workspace", { method: "POST" });
  const data = await res.json();
  logLine("--- reset workspace ---", "line-tool");
  logBlock(data.output || "(reset)");
  refreshBackendStatus();
  e.target.disabled = false;
};

document.getElementById("btn-dev-change").onclick = async (e) => {
  e.target.disabled = true;
  const res = await fetch("/api/apply-dev-change", { method: "POST" });
  const data = await res.json();
  logLine("--- dev change injected ---", "line-tool");
  logBlock(data.output);
  refreshBackendStatus();
  e.target.disabled = false;
};

document.getElementById("btn-run").onclick = () => {
  const btn = document.getElementById("btn-run");
  btn.disabled = true;
  logEl.innerHTML = "";
  fixPanel.style.display = "none";
  fixPanelBody.innerHTML = "";
  logLine("Running agent...", "line-tool");

  const source = new EventSource("/api/run-agent");
  source.onmessage = (event) => {
    const { kind, data } = JSON.parse(event.data);
    if (kind === "start") {
      logLine("");
      logLine("TASK: " + data.task, "line-tool");
    } else if (kind === "reasoning") {
      logLine("");
      logBlock(data.text);
    } else if (kind === "tool_call") {
      logLine("");
      logLine("> " + data.name + "(" + JSON.stringify(data.input) + ")", "line-tool");
    } else if (kind === "tool_result") {
      let out;
      if (data.result && data.result.diff) {
        out = `(${data.result.total_fixed} files fixed: ${(data.result.files_fixed||[]).join(", ")})\n` + data.result.diff;
        showFixPanel(data.result);
      } else if (data.result && data.result.output) {
        out = data.result.output;
      } else {
        out = JSON.stringify(data.result);
      }
      logBlock(out.slice(0, 2000));
    } else if (kind === "final") {
      logLine("");
      logLine("=== SUMMARY ===", "line-final");
      logBlock(data.summary);
    } else if (kind === "error") {
      logLine("ERROR: " + data.message, "line-fail");
    }
  };
  source.addEventListener("done", () => {
    source.close();
    btn.disabled = false;
    refreshBackendStatus();
  });
  source.onerror = () => {
    source.close();
    btn.disabled = false;
  };
};
</script>
</body>
</html>
